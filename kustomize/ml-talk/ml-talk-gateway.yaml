apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ml-talk-philiplehmann
spec:
  parentRefs:
  - name: istio
    namespace: istio-system
  hostnames:
  - ml-talk.philiplehmann.ch
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: ml-talk-philiplehmann
      port: 8080
